name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Strip the leading "v" from the tag so archive names use bare version
      # numbers (e.g. jig_0.1.0_linux_amd64.tar.gz).
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o jig
          tar -czf jig_${VERSION}_linux_amd64.tar.gz jig
          rm jig

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w" -o jig
          tar -czf jig_${VERSION}_linux_arm64.tar.gz jig
          rm jig

      - name: Build darwin/amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o jig
          tar -czf jig_${VERSION}_darwin_amd64.tar.gz jig
          rm jig

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w" -o jig
          tar -czf jig_${VERSION}_darwin_arm64.tar.gz jig
          rm jig

      - name: Build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o jig.exe
          zip jig_${VERSION}_windows_amd64.zip jig.exe
          rm jig.exe

      - name: Generate checksums
        run: |
          sha256sum \
            jig_${VERSION}_linux_amd64.tar.gz \
            jig_${VERSION}_linux_arm64.tar.gz \
            jig_${VERSION}_darwin_amd64.tar.gz \
            jig_${VERSION}_darwin_arm64.tar.gz \
            jig_${VERSION}_windows_amd64.zip \
            > sha256sums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            jig_${{ env.VERSION }}_linux_amd64.tar.gz
            jig_${{ env.VERSION }}_linux_arm64.tar.gz
            jig_${{ env.VERSION }}_darwin_amd64.tar.gz
            jig_${{ env.VERSION }}_darwin_arm64.tar.gz
            jig_${{ env.VERSION }}_windows_amd64.zip
            sha256sums.txt
